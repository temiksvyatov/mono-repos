# pip.conf — baked into every Python image via COPY in images/python/config.yaml.
# IMPORTANT: Changes to this file require rebuilding ALL Python images.
# Do NOT embed credentials in this file — use Artifactory anonymous access or
# inject tokens at build time via --mount=type=secret.
[global]
timeout = 30
index-url = https://artifactory.nexign.com/artifactory/api/pypi/pypi/simple
trusted-host = artifactory.nexign.com
# extra-index-url points to an internal artifact path; update requires image rebuild
extra-index-url= https://artifactory.nexign.com:443/artifactory/generic-dev-local/ps/rnd/mfactory
