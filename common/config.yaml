# =============================================================================
# common/config.yaml — Default configuration applied to ALL images.
# Overridden by images/<image>/config.yaml, then images/<image>/<version>/config.yaml.
# Merge strategy: scalars and lists are replaced by child configs; dicts are merged.
#
# Fields:
#   package_manager: apk | microdnf | dnf
#   packages:  List of packages to install.
#   env:       Map of ENV variables (key: value).
#   users:     List of {name, uid} to create via adduser.
#   copy:      List of {source, dest} COPY instructions.
#   run:       List of shell commands for RUN instructions.
#   workdir:   WORKDIR path.
#   user:      USER (UID or name).
# =============================================================================
default:
  package_manager: apk
  # registry and target_registry are NOT defined here to enforce a single source of truth.
  # Authoritative values are in versions.yaml (image_tag_format) and Jenkinsfile (REGISTRY_URL).
  packages:
    - ca-certificates
    - bash
    - curl
  env:
    LANG: en_US.UTF-8
    LANGUAGE: en_US:en
    LC_ALL: en_US.UTF-8
  users:
    - name: mf-user
      uid: 11200
    - name: jenkins
      uid: 11160
  copy:
    - source: common/files/certs/*
      dest: /usr/local/share/ca-certificates/
    - source: common/files/timezones/Moscow
      dest: /usr/share/zoneinfo/Europe/Moscow
  run:
    - update-ca-certificates
    - mkdir -p /data/cache && chmod 777 /data/cache
    - ln -sf /usr/share/zoneinfo/Europe/Moscow /etc/localtime
  workdir: /data/app
  user: 11200
